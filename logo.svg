<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="StatsServiceBook">
  <defs>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <g clip-path="url(#clip)">

    <!-- Area fill under the route line -->
    <polygon
      points="4,46 13,46 19,32 25,40 32,18 39,32 45,25 51,32 60,32 60,56 4,56"
      fill="#fc4c02" fill-opacity="0.15"/>

    <!-- Route / elevation profile — the core feature -->
    <polyline
      points="4,46 13,46 19,32 25,40 32,18 39,32 45,25 51,32 60,32"
      fill="none"
      stroke="#fc4c02"
      stroke-width="3.2"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- GPS / start dot -->
    <circle cx="4" cy="46" r="2.5" fill="#fc4c02"/>

    <!-- Finish / current-position dot -->
    <circle cx="60" cy="32" r="2.5" fill="#fc4c02"/>

  </g>

  <!-- WiFi signal arcs — top-right, represents the router -->
  <path d="M43,13 Q50,7  57,13" fill="none" stroke="#fc4c02" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
  <path d="M46,17 Q50,13 54,17" fill="none" stroke="#fc4c02" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <circle cx="50" cy="21" r="2.2" fill="#fc4c02"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="#fc4c02" stroke-width="0.8" stroke-opacity="0.35"/>
</svg>
